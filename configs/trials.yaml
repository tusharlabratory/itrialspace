# Published lung cancer screening trial parameters.
# Used by TrialKnowledgeBase to instantiate TrialSpec objects.
#
# Sources:
#   NLST:   Aberle et al. NEJM 2011; 365:395-409
#   NELSON: de Koning et al. NEJM 2020; 382:503-513
#   UKLS:   Field et al. Lancet Respir Med 2016; 4:699-709
#   DANTE:  Infante et al. AJRCCM 2009; 180:445-453
#   MILD:   Pastorino et al. ERJ 2012; 39:1354-1362

trials:

  NLST:
    full_name: "National Lung Screening Trial"
    publication: "Aberle et al. NEJM 2011"
    population: screening
    n_participants: 26722
    demographics:
      age_range: [55, 74]
      age_mean: 61.4
      age_std: 5.0
      sex_ratio_male: 0.59
      smoking_status: ["Current", "Former"]
      pack_years_min: 30
    nodule_prevalence:
      any_nodule: 0.245
      malignancy_rate: 0.04
    size_distribution:
      bucket_weights:
        "<5mm": 0.42
        "5-10mm": 0.38
        "10-15mm": 0.11
        "15-20mm": 0.05
        "20-30mm": 0.03
        ">30mm": 0.01
